device:
  preferred: auto
  allow_directml: true

mesh:
  path: null
  demo_shape: uv_sphere
  color: [0.78, 0.64, 0.42]

camera:
  train_radius: 2.8
  train_views: 24
  elevations: [-20.0, 0.0, 20.0]
  fov_y_degrees: 45.0

demo:
  far_radius: 4.0
  near_radius: 1.25
  frames: 32
  azimuth_degrees: 35.0
  elevation_degrees: 10.0

render:
  image_size: [192, 192]
  gaussian_backend: torch
  background: [0.04, 0.045, 0.055]
  mesh_backend: software

lod:
  counts: [10, 20, 50, 100, 250, 500, 1000, 2500, 5000, 10000, 20000, 50000, 100000]
  max_gaussians: 20000
  seed: 7
  low_lod_scale_boost: 1.8

transition:
  # Distances are in normalized object units.
  mesh_fade_start: 3.6
  mesh_fade_end: 2.2
  lod_mode: progressive
  lod_ranges:
    "10": [4.2, 3.1]
    "20": [4.0, 3.4]
    "50": [3.8, 3.2]
    "100": [3.6, 3.0]
    "250": [3.4, 2.8]
    "500": [3.2, 2.6]
    "1000": [3.0, 2.4]
    "2500": [2.8, 2.2]
    "5000": [2.6, 2.0]
    "10000": [2.4, 1.8]
    "20000": [2.2, 1.6]
    "50000": [2.0, 1.3]
    "100000": [1.7, 1.0]

training:
  enabled: false
  steps: 50
  learning_rate: 0.01

outputs:
  root: data/outputs
  save_lods: true
  save_frames: true
  video_fps: 12

progress:
  enabled: true
  verbose: true

web:
  source_dirs: ["data/source", "data/meshes"]
  upload_dir: "data/source/uploads"
  trained_dirs: ["data/trained_gaussians"]
  mesh2splat_lod_dirs: ["data/mesh2splats"]
  preview_lod_counts: [10, 20, 50, 100, 250, 500, 1000, 2500, 5000, 10000, 20000, 50000, 100000]

training_dataset:
  root: data/generated_datasets
  radius: 2.8
  elevations: [-30.0, -10.0, 10.0, 30.0]
  views_per_elevation: 24
  initial_point_count: 20000
  research_elevations: [-45.0, -30.0, -15.0, 0.0, 15.0, 30.0, 45.0]
  research_views_per_elevation: 36
  research_initial_point_count: 100000

mesh2splat_sweep:
  densities: [0.5, 1.0, 1.5, 2.0, 3.0]
  output_dir: data/mesh2splats
  sample_count: 80000

gsplat:
  repo: ../gsplat
  python_executable: null
  steps: 3000
  data_factor: 1
  result_dir: data/trained_gaussians
  export_iteration: latest
  extra_args: []

mesh2splat:
  executable: C:/Users/jerne/Documents/faks/magisterij/1.letnik/nrg/seminar/mesh2splat/bin/Release/Mesh2Splat.exe
  working_dir: C:/Users/jerne/Documents/faks/magisterij/1.letnik/nrg/seminar/mesh2splat/bin/Release
  output_dir: data/trained_gaussians/mesh2splat
  glb_cache_dir: data/converted_glb
  density: 1.0
  timeout_seconds: 300
  extra_args: []
